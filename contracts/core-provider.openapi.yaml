openapi: 3.0.3
info:
  title: RERUM Core Provider Contract
  version: 1.0.0
  description: Provider-maintained baseline for the core RERUM API surface.
servers:
  - url: https://store.rerum.io/v1
paths:
  /api:
    get:
      summary: Describe the core API endpoints
      operationId: describeCoreApi
      responses:
        '200':
          description: Available endpoint summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /id/{id}:
    get:
      summary: Read object by id
      operationId: getObjectById
      parameters:
        - $ref: '#/components/parameters/ObjectId'
      responses:
        '200':
          description: Object payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '404':
          $ref: '#/components/responses/NotFound'
    head:
      summary: Read object headers by id
      operationId: headObjectById
      parameters:
        - $ref: '#/components/parameters/ObjectId'
      responses:
        '200':
          description: Object headers
        '404':
          $ref: '#/components/responses/NotFound'
  /since/{id}:
    get:
      summary: Read updates since id
      operationId: getSince
      parameters:
        - $ref: '#/components/parameters/ObjectId'
      responses:
        '200':
          description: Incremental updates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericArray'
        '404':
          $ref: '#/components/responses/NotFound'
    head:
      summary: Read update headers since id
      operationId: headSince
      parameters:
        - $ref: '#/components/parameters/ObjectId'
      responses:
        '200':
          description: Incremental update headers
        '404':
          $ref: '#/components/responses/NotFound'
  /history/{id}:
    get:
      summary: Read object history by id
      operationId: getHistory
      parameters:
        - $ref: '#/components/parameters/ObjectId'
      responses:
        '200':
          description: Version history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericArray'
        '404':
          $ref: '#/components/responses/NotFound'
    head:
      summary: Read object history headers by id
      operationId: headHistory
      parameters:
        - $ref: '#/components/parameters/ObjectId'
      responses:
        '200':
          description: Version history headers
        '404':
          $ref: '#/components/responses/NotFound'
  /api/query:
    post:
      summary: Query objects
      operationId: queryObjects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
      responses:
        '200':
          description: Query results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericArray'
        '400':
          $ref: '#/components/responses/BadRequest'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
    head:
      summary: Query object headers
      operationId: headQueryObjects
      responses:
        '200':
          description: Query result headers
  /api/search:
    post:
      summary: Search objects by keywords
      operationId: searchObjects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
          text/plain:
            schema:
              type: string
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericArray'
        '400':
          $ref: '#/components/responses/BadRequest'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
  /api/search/phrase:
    post:
      summary: Search objects by phrase
      operationId: searchObjectsByPhrase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
          text/plain:
            schema:
              type: string
      responses:
        '200':
          description: Phrase search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericArray'
        '400':
          $ref: '#/components/responses/BadRequest'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
  /api/create:
    post:
      summary: Create object
      operationId: createObject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
      responses:
        '201':
          description: Created object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
  /api/bulkCreate:
    post:
      summary: Create multiple objects
      operationId: bulkCreateObjects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericArray'
      responses:
        '201':
          description: Created objects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericArray'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
  /api/update:
    put:
      summary: Update object
      operationId: updateObject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
      responses:
        '200':
          description: Updated object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
  /api/bulkUpdate:
    put:
      summary: Update multiple objects
      operationId: bulkUpdateObjects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericArray'
      responses:
        '200':
          description: Updated objects. Items that were not found or were already deleted are silently skipped.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericArray'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
  /api/overwrite:
    put:
      summary: Overwrite object
      operationId: overwriteObject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
      responses:
        '200':
          description: Overwritten object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
  /api/patch:
    patch:
      summary: Patch object
      operationId: patchObject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
      responses:
        '200':
          description: Patched object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '501':
          $ref: '#/components/responses/NotImplemented'
    post:
      summary: Patch object via override-compatible POST
      operationId: patchObjectViaPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
      responses:
        '200':
          description: Patched object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '405':
          description: Method not allowed — POST is only permitted with X-HTTP-Method-Override.
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '501':
          $ref: '#/components/responses/NotImplemented'
  /api/set:
    patch:
      summary: Add properties to object
      operationId: setObjectProperties
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
      responses:
        '200':
          description: Updated object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '501':
          $ref: '#/components/responses/NotImplemented'
    post:
      summary: Add properties to object via override-compatible POST
      operationId: setObjectPropertiesViaPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
      responses:
        '200':
          description: Updated object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '405':
          description: Method not allowed — POST is only permitted with X-HTTP-Method-Override.
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '501':
          $ref: '#/components/responses/NotImplemented'
  /api/unset:
    patch:
      summary: Remove properties from object
      operationId: unsetObjectProperties
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
      responses:
        '200':
          description: Updated object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '501':
          $ref: '#/components/responses/NotImplemented'
    post:
      summary: Remove properties from object via override-compatible POST
      operationId: unsetObjectPropertiesViaPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
      responses:
        '200':
          description: Updated object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '405':
          description: Method not allowed — POST is only permitted with X-HTTP-Method-Override.
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '501':
          $ref: '#/components/responses/NotImplemented'
  /api/delete/{id}:
    delete:
      summary: Delete object by id
      operationId: deleteObjectById
      parameters:
        - $ref: '#/components/parameters/ObjectId'
      responses:
        '204':
          description: Object marked deleted; no response body.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/release/{id}:
    patch:
      summary: Release object by id
      operationId: releaseObject
      parameters:
        - $ref: '#/components/parameters/ObjectId'
      responses:
        '200':
          description: Release result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
components:
  parameters:
    ObjectId:
      in: path
      name: id
      required: true
      schema:
        type: string
  schemas:
    GenericObject:
      type: object
      additionalProperties: true
    GenericArray:
      type: array
      items:
        $ref: '#/components/schemas/GenericObject'
  responses:
    BadRequest:
      description: Bad request — the request body was missing, empty, or otherwise invalid.
    Unauthorized:
      description: Unauthorized — missing, malformed, or invalid bearer token.
    Forbidden:
      description: Forbidden — the target object is deleted, released, or not owned by the requesting agent.
    NotFound:
      description: Not found — no object exists for the supplied id.
    Conflict:
      description: Conflict — the supplied optimistic-lock version does not match the current object version.
    PayloadTooLarge:
      description: Payload too large — the request body exceeded the configured size limit.
    UnsupportedMediaType:
      description: Unsupported media type — the Content-Type header was not acceptable for this endpoint.
    NotImplemented:
      description: Not implemented — operating on a non-RERUM object via this endpoint is not yet supported.
    ServiceUnavailable:
      description: Service unavailable — the server is in maintenance or read-only mode.
